<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>즐거운 국어 퀴즈!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>💡 즐거운 몸풀기 국어 퀴즈</h1>
        <div id="score-board">점수: <span id="score">0</span>점</div>
        
        <div id="quiz-area">
            <h2 id="question">질문이 여기에 표시됩니다.</h2>
            <div id="options" class="options-container">
                </div>
        </div>

        <div id="feedback" class="feedback hide"></div>
        
        <button id="next-btn" class="hide">다음 문제</button>
        <button id="restart-btn" class="hide">다시 풀기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
